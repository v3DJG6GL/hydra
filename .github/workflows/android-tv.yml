# Android TV app: signed release APK on tv-v* tags, sanity build on PRs.
# Tag namespace is tv-v* — docker.yml owns plain v* tags.
#
# Secrets (repo settings → secrets → actions):
#   TV_KEYSTORE_BASE64    base64 of the release keystore (generate once:
#                         keytool -genkeypair -v -keystore hydra-tv.keystore
#                           -alias hydra-tv -keyalg RSA -keysize 2048 -validity 10000
#                         then: base64 -w0 hydra-tv.keystore)
#   TV_KEYSTORE_PASSWORD, TV_KEY_ALIAS, TV_KEY_PASSWORD
# Keep the keystore backed up offline — losing it breaks update continuity
# for every sideloaded install.
name: android-tv

on:
  push:
    tags: ['tv-v*']
  pull_request:
    paths: ['android/**', '.github/workflows/android-tv.yml']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4

      - name: Derive version from tag
        id: ver
        run: |
          if [[ "$GITHUB_REF" == refs/tags/tv-v* ]]; then
            V="${GITHUB_REF#refs/tags/tv-v}"
            IFS=. read -r MAJ MIN PAT <<< "$V"
            CODE=$(( MAJ*10000 + MIN*100 + ${PAT:-0} ))
          else
            V="0.0.0-${GITHUB_SHA::7}"
            CODE=1
          fi
          echo "name=$V" >> "$GITHUB_OUTPUT"
          echo "code=$CODE" >> "$GITHUB_OUTPUT"

      - name: Decode keystore
        if: ${{ secrets.TV_KEYSTORE_BASE64 != '' }}
        env:
          TV_KEYSTORE_BASE64: ${{ secrets.TV_KEYSTORE_BASE64 }}
        run: echo "$TV_KEYSTORE_BASE64" | base64 -d > android/release.keystore

      - name: Build release APK
        env:
          TV_KEYSTORE_PASSWORD: ${{ secrets.TV_KEYSTORE_PASSWORD }}
          TV_KEY_ALIAS: ${{ secrets.TV_KEY_ALIAS }}
          TV_KEY_PASSWORD: ${{ secrets.TV_KEY_PASSWORD }}
        run: |
          if [ -f android/release.keystore ]; then
            export TV_KEYSTORE_FILE="$PWD/android/release.keystore"
          fi
          ./gradlew -p android :app:assembleRelease \
            -PversionName='${{ steps.ver.outputs.name }}' \
            -PversionCode='${{ steps.ver.outputs.code }}'

      - uses: actions/upload-artifact@v4
        with:
          name: hydra-tv-apk
          path: android/app/build/outputs/apk/release/*.apk

      - name: Release
        if: startsWith(github.ref, 'refs/tags/tv-v')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/*.apk
          generate_release_notes: true
