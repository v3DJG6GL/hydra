# Sample deployment config for the hydra web editor.
# Copy to your server and run: docker compose up -d
#
# The images are public on GHCR once the package visibility is set;
# otherwise `docker login ghcr.io` first with a token that has read:packages.
#
# Both images run under any arbitrary uid:gid (compose `user:` overrides).

services:
  hydra:
    image: ghcr.io/v3djg6gl/hydra:latest
    container_name: hydra
    restart: unless-stopped
    # user: "568:568"
    ports:
      # host:container — serve on http://<server>:8080
      - "8080:8080"
    # nginx proxies /ws to the relay; override when your relay service or
    # network alias is named differently (defaults shown):
    # environment:
    #   HYDRA_RELAY_HOST: hydra-relay
    #   HYDRA_RELAY_PORT: "8081"

  # WebSocket relay for the remote VJ deck (tablet/laptop controlling this
  # instance). nginx inside `hydra` proxies /ws here — no extra published
  # port, and any TLS proxy in front only ever talks to :8080.
  # If you rename this service, set HYDRA_RELAY_HOST on the hydra service
  # to match (or give this service a network alias `hydra-relay`).
  hydra-relay:
    image: ghcr.io/v3djg6gl/hydra-relay:latest
    container_name: hydra-relay
    restart: unless-stopped
    # user: "568:568"
    # Live-preview bandwidth budgets, pushed to the renderer on connect
    # (docs/remote-deck.md). Three layers, least -> most specific:
    #   1. nothing set — mode defaults apply (shown below)
    #   2. HYDRA_PREVIEW_*     — applies to both modes
    #   3. HYDRA_PREVIEW_WAN_* / HYDRA_PREVIEW_LAN_* — that mode only,
    #      beats the unscoped var. Only needed when ONE stack serves both
    #      modes at once (LAN http plus a TLS proxy in front); separate
    #      LAN and WAN deployments just use layer 2 on each relay.
    # The relay tells the modes apart by the renderer's Origin scheme:
    # https = WAN, plain http = LAN.
    # environment:
    #   ## both modes:
    #   # HYDRA_PREVIEW_RTC_KBPS: "1200"     # WebRTC sender cap (kbit/s)
    #   # HYDRA_PREVIEW_FRAME_KBPS: "150"    # relayed-frames budget (KB/s)
    #   # HYDRA_PREVIEW_FRAME_WIDTH: "480"   # preview resolution ceiling (px)
    #   # HYDRA_PREVIEW_MIN_FRAME_MS: "350"  # fastest frame cadence
    #   ## WAN (https) renderers only — mode defaults shown:
    #   # HYDRA_PREVIEW_WAN_RTC_KBPS: "1200"
    #   # HYDRA_PREVIEW_WAN_FRAME_KBPS: "150"
    #   # HYDRA_PREVIEW_WAN_FRAME_WIDTH: "480"
    #   # HYDRA_PREVIEW_WAN_MIN_FRAME_MS: "350"
    #   ## LAN (http) renderers only — mode defaults shown:
    #   # HYDRA_PREVIEW_LAN_RTC_KBPS: "6000"
    #   # HYDRA_PREVIEW_LAN_FRAME_KBPS: "400"
    #   # HYDRA_PREVIEW_LAN_FRAME_WIDTH: "720"
    #   # HYDRA_PREVIEW_LAN_MIN_FRAME_MS: "350"
    volumes:
      # per-room scene banks survive restarts (and kiosk browsers that wipe
      # localStorage)
      - hydra-relay-data:/data

volumes:
  hydra-relay-data:
