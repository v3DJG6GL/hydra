# Sample deployment config for the hydra web editor.
# Copy to your server and run: docker compose up -d
#
# The image is public on GHCR once the package visibility is set;
# otherwise `docker login ghcr.io` first with a token that has read:packages.

services:
  hydra:
    image: ghcr.io/v3djg6gl/hydra:latest
    container_name: hydra
    restart: unless-stopped
    ports:
      # host:container — serve on http://<server>:8080
      - "8080:80"

  # Optional: auto-pull new images pushed by CI and restart the container.
  # Remove the profile line (or run `docker compose --profile auto-update up -d`)
  # to enable it.
  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: unless-stopped
    profiles: [auto-update]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 300 --cleanup hydra
